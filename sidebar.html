<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 2000px;
        }
        
        
        /*strech the width and height set thr postion fixed */
        .header{
           background-color: rgb(216, 188, 188);
           border: 2px solid cornsilk;
           box-shadow: inset;
            position: fixed;
            top:0;
            left: 0;
            right: 0;
            height: 50px;
            z-index: 5;
            

        }
        .container{
            margin: 50px;

        }
        .btn{
            position: absolute;
            
            right: 10px;
            bottom: 10px;
        }

        .side{
            background-color: red;
            position: fixed;
            justify-content: center;
            bottom: 0px;
            top: 0;
            left: 0;
            width: 30px;
            margin-top: 50px;
            align-items: center;
            
            
            
        }

        .side-images{
            align-items: center;
            background-color: aliceblue;
            margin: 1px;
            cursor: pointer;
            height: 50px;
            position: relative;
            &:hover{
                background-color: aqua;
            }
            
            
            
        }
        .tool-tip{
            background-color: aqua;
            font-size: 8px;
            right: -30px;
            padding: 3px;
            bottom: -15px;
            opacity: 0;
            cursor: pointer;
            &:hover{
              opacity: 1;
            }

        }
        
    </style>
</head>
<body>
        <div class="header">
            Header
        </div>
        <div>
            <p style="margin-left: 30px ; margin-top: 50px;">
                hello this is me nitesh from gorakhpur.
            </p>

        </div>
        <div class="container">
        <div style=" background-color: rebeccapurple; width: 100px; height: 100px; position: relative; z-index: 0;">hello
            <div class="btn">
                 <button>Click</button>
            </div>
           
        </div>
        <div style="background-color: aqua; width: 200px; height: 200px; position: relative; margin-top: 20px;">hello ji 
            <div class="btn">
                <button>
                    hello
                </button>
            </div>
        </div>
        </div>
        <div class="side">
            <div class="side-images">
                <img src="/images/bars.svg" alt="">
            </div>
            <div class="side-images">
                 <img src="/images/download.svg" alt="">
                <div class="tool-tip">
                    Download</div>
            </div>
           
            <div class="side-images">
                <img src="/images/heartplus.svg" alt="">
            </div>
            <div class="side-images">
                 <img src="/images/men.svg" alt="">
            </div>
            
           
            
           
        </div>
    
    
</body>
</html>
