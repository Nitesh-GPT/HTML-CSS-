<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Card.css">
</head>
<body>
    <div class="headre">
        <h1>Timer Clock</h1>
    </div>
    
    <div class="container">
        
        <div class="time">10</div>
        <div class="btn">
        <button onclick="Start()">Start</button>
        <button onclick="Restart()">Restart</button>
        <button onclick="Pause()">Pause</button>
        </div>
    </div>
    <script>
        let Starting = 10;
        let Interval;
        let truth = false;
        

       function Start (){
        clearInterval(Interval);
        Interval = setInterval(() => {
            if(Starting <= 0){
            clearInterval(Interval);
            document.querySelector(".time").innerHTML="Finished Babe!";

        }
        else{
            Starting--;
            document.querySelector(".time").innerHTML = Starting;
        }

        }, 1000)
        
       }
        
       
        function Restart(){
            //clearInterval(Interval);
            Starting = 10;
            document.querySelector(".time").innerHTML = Starting;
            
            

        }

        function Pause(){
            clearInterval(Interval);


        }
        
        
    
      </script>
</body>
</html>
